  - name: Bellroy
    position: Lead Software Engineer
    url: https://bellroy.com/
    startDate: "2019-08"
    endDate: "2022-01"
    summary: >
      Bellroy is an Australian e-commerce company that decided to pivot its
      backend from Ruby on Rails to Haskell after early success with Elm on
      the frontend. I joined as the founding Haskell engineer to establish
      the stack, practices, and team.
    highlights:
      - >
        Designed and built a Haskell customer-behaviour simulation that modelled
        Bellroy's full purchase funnel. After a month of collaborative iteration
        the model was handed to the data science team, who used it as the
        foundation for their own analytical work — one of the cleaner examples
        of FP as a tool for exploratory research, not just production services.
      - >
        Bet early on serverless: the first service I shipped used AWS Lambda and
        DynamoDB; it is still running in production with no major incidents. That
        durability signal convinced the team to make serverless the default
        deployment pattern. By the time I left, the estate had grown from 0 to 6
        serverless services, each comprising multiple Lambda functions.
      - >
        Led a 5-day on-site functional programming course for colleagues, then
        provided ongoing mentorship. Three colleagues transitioned to full-time
        Haskell development as a result.
      - >
        Built a compiler framework for strongly-typed, composable e-commerce
        DSL compilers. Four DSLs emerged from this framework — covering shipping
        logistics and product promotion rules — and are in active production use.
      - >
        Advised on the gradual monolith-to-distributed transition as the platform
        scaled horizontally, ensuring the new Haskell services could integrate
        cleanly with the existing Rails systems during the migration period.
    keywords:
      - Haskell
      - Elm
      - Nix
      - DynamoDB
      - AWS Lambda
      - Serverless
      - Ruby

