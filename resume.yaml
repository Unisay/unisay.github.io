references:
  - name: Christopher Coffey
    title: CTO @ CollegeVine
    date: "2019-06"
    reference: >
      When we extended our offer to Yuriy, he responded saying that CollegeVine's
      contract with Alan Turing was signed. While it turned out that this happened
      to be the name of the agency through which we were working, his sense of humor
      and zeal for writing quality software were apparent from day 1. Over the course
      of his time at CollegeVine Yuriy did very high-quality work. He made a major
      impact spinning up several new Haskell services from scratch, as well as several
      critical features in our UI. He was never afraid to venture into whichever part
      of the system we needed him in, and pretty much always left it better than he
      found it.

      He's been writing software for a long time, and that experience is apparent in
      Yuriy's ability to introduce positive change to teams. He was never afraid to
      share opinions and suggestions for improvement, most of which were adopted by
      the team. One particularly impressive bit of work was a property-based integration
      testing framework built upon Selenium, which we used to immediately protect a
      critical workflow for the company.

      If you're looking to start up a new engineering team or add a highly effective
      team member to an existing team, Yuriy is a great choice! I'd be thrilled to
      work with him again in the future.

  - name: Eric Torreborre
    title: "Senior Software Engineer (Rust, Haskell, Scala)"
    date: "2019-06"
    reference: >
      I worked with Yuriy at Zalando, in the Merchant Operations department. You
      cannot make a mistake by deciding to work with Yuriy because he is curious,
      dedicated and very thorough. I was also the witness of Yuriy's growing love
      for Functional Programming, using various languages, like Haskell, Purescript,
      Scala and he is now a very skilled person in that domain, capable of delivering
      reliable and maintainable systems. On the personal side, he is pleasant to
      work with, always constructive and a team player. In one icon: highly recommended.

  - name: Patrice Moore
    title: Full Stack Software Engineering Manager
    date: "2013-02"
    reference: >
      Yuriy was amazing. I have hired numerous developers, both in person and through
      odesk. Yuriy was one of the best. He started working on adding significant
      features, took responsibility for crafting solutions to technical issues with
      only minimal direction.

      Yuriy reachitected portions of FarReaches wordpress plugin to remove significant
      technical debt, created and improved significant parts of our automated testing
      framework, and created an eventbus that allows the browser javascript UI and
      the PHP wordpress plugin to communicate in an elegant, extensible manner.

  - name: Bartlomiej Nagorski
    title: Delivery Manager & Job Family Lead at GFT
    date: "2012-12"
    reference: >
      Yuriy is highly proficient developer with extensive programming knowledge that
      covers development, testing and a huge number of frameworks and libraries. He
      is also familiar with different software development methodologies, which has
      proved to be very useful in his team lead role. Yuriy has been able to propose
      a number of technical solutions and process improvements to our clients, as
      well as organise work for the team and mentor his less experienced colleagues.

      I am recommending Yuriy, because he is a team player, a good colleague and an
      expert in software development.
