  profiles:
    - network: GitHub
      username: Unisay
      url: https://github.com/Unisay
    - network: LinkedIn
      username: lazaryevyuriy
      url: https://www.linkedin.com/in/lazaryevyuriy
  summary: >
    Software engineer with 25+ years of experience. Started in web development,
    went deep into backend and distributed systems. My interest in DSLs led me
    to compilers — I tried writing my own backend for a PureScript-to-Lua
    compiler, enjoyed it, and decided to do it full-time. That is how I ended up
    working on the smart-contract language compiler for Cardano.


    I look for teams with a well-understood mission where I can make meaningful
    contributions — bringing functional programming strengths, first-principles
    thinking, and a design-before-build discipline that tends to produce software
    that is correct and secure before it is fast.

work:
  - name: Intersect MBO
    position: Senior Software Engineer — Plutus Core Team
    url: https://www.intersectmbo.org/
    startDate: "2024-01"
    summary: >
      Intersect is the member-based organization stewarding the Cardano open-source
      ecosystem. As a compiler engineer on the Plutus Core team I work on the Plutus
      and Plinth compilers — the foundation of Cardano's smart contract platform.
    highlights:
      - >
        Designed and built the UPLC-CAPE benchmarking framework: a structured
        harness for measuring Untyped Plutus Language Core (UPLC) program
        performance across compiler versions. Presented at the UPLC 2025 workshop
        (https://plutus.cardano.intersectmbo.org/uplc2025/talks/cape-workshop/).
      - >
        Security review work on high-stakes blockchain code: auditing and hardening
        smart contract compiler output where on-chain bugs have real financial consequences.
      - >
        Authored the concept and co-built an AI-assisted bug-discovery pipeline: I led a
        team of AI specialists, contributed a custom pipeline component (evaluation engine), 
        and integrated the result into the compiler's existing tooling.
      - >
        Cardano Node release manager: coordinated multi-team release process for
        cardano-node, including integration testing, changelog curation, and stakeholder
        sign-off (https://github.com/IntersectMBO/cardano-node/issues/5868).
      - >
        Implemented CIP-57: a machine-readable format for documenting Plutus smart
        contract blueprints, enabling tooling to generate type-safe client code.
      - >
        Authored and implemented CIP-0156 (multiIndexArray builtin): took the proposal
        from initial draft through community ratification to full compiler implementation.
        This is the standard path for extending the Cardano scripting language.
      - >
        Implemented a Cardano blockchain indexer that continuously collects execution
        statistics on all Plutus scripts running on mainnet, feeding a Grafana dashboard
        used by the compiler team to make data-informed optimization decisions.
    keywords:
      - Haskell
      - Nix
      - Plutus
      - Plinth
      - Cardano Blockchain
      - Compiler Engineering
      - Security
      - Benchmarking

