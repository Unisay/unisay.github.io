work:
  - name: Intersect MBO
    highlights:
      - >
        Authored and implemented CIP-0156 (multiIndexArray builtin): from initial
        draft through community ratification to full compiler implementation.
      - >
        Designed and built the UPLC-CAPE benchmarking framework for measuring
        UPLC program performance across compiler versions. Presented at the UPLC
        2025 workshop. Security review work on high-stakes blockchain compiler output.
      - >
        Cardano Node release manager. Implemented CIP-57 (machine-readable Plutus
        contract blueprints) and a blockchain indexer feeding a Grafana dashboard
        for compiler optimization decisions.

  - name: Input-Output Global → Cardano Foundation
    highlights:
      - >
        Designed and shipped Light Backend Mode for the full-node wallet —
        letting users transact without a full chain sync by routing chain
        queries through an external indexing API. Owned end-to-end; later
        retired when the team dropped the external-API dependency.
      - >
        Rewrote the wallet's transaction-construction pipeline around a unified
        balancing primitive, replacing a legacy path that had diverged across
        endpoints — core logic exercised by every transaction the wallet emits.
      - >
        Remastered the end-to-end test infrastructure: turned a flaky shared
        suite into a reliable per-PR check, with the suite owning its own
        preprod node/wallet lifecycle.

  - name: Bellroy
    highlights:
      - >
        Founded the Haskell engineering practice: established stack, tooling,
        and patterns. Grew serverless estate from 0 to 6 AWS Lambda + DynamoDB
        services — all still running in production without incidents.
      - >
        Built a DSL compiler framework yielding 4 production compilers (shipping
        logistics, promotion rules). Led a 5-day FP training; 3 colleagues
        transitioned to full-time Haskell development.

  - name: CollegeVine
    highlights:
      - >
        Built backend and frontend features (Haskell, PureScript, React).
        Designed a UI test automation framework that significantly reduced
        manual QA time.

